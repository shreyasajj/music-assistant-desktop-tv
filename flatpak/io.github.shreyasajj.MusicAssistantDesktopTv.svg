<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e0c6"/>
      <stop offset="1" stop-color="#ff3da6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ff3da6"/>
      <stop offset="0.55" stop-color="#00e0c6"/>
      <stop offset="1" stop-color="#00e0c6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- app background -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#07070b"/>

  <!-- accent glow -->
  <circle cx="128" cy="118" r="74" fill="url(#glow)" opacity="0.9"/>

  <!-- gradient rounded square (wordmark dot motif) -->
  <rect x="64" y="64" width="128" height="128" rx="30" fill="url(#accent)" opacity="0.18"/>

  <!-- play triangle -->
  <path d="M108 92 L108 164 L168 128 Z" fill="#ffffff"/>

  <!-- progress underline -->
  <rect x="64" y="196" width="128" height="8" rx="4" fill="url(#accent)"/>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body style="overflow:hidden;">
  <!-- immersive blurred backdrop derived from the album art -->
  <div style="position:absolute; inset:0; background:linear-gradient(135deg,#00e0c6,#7a4bd0,#ff3da6); filter:blur(140px) brightness(0.55); transform:scale(1.4);"></div>
  <div style="position:absolute; inset:0; background:linear-gradient(to bottom, rgba(11,11,18,0.15) 38%, rgba(11,11,18,0.97) 92%);"></div>

  <!-- slim tab bar -->
  <div class="tabbar" style="position:relative; z-index:2;">
    <span class="active">Now Playing</span><span>Search</span><span>Lyrics</span><span>Visualizer</span>
  </div>
  <!-- player picker top-right -->
  <div style="position:absolute; top:40px; right:64px; z-index:2; font-size:var(--sm); color:var(--muted);">Playing on <b style="color:#fff;">Living Room ▾</b></div>

  <!-- crisp album art, dominant upper region -->
  <div style="position:relative; z-index:2; display:flex; justify-content:center; margin-top:18px;">
    <div class="art" style="width:560px; height:560px; box-shadow:0 50px 140px rgba(0,0,0,0.65);"></div>
  </div>

  <!-- info + controls pinned to the lower band -->
  <div style="position:absolute; left:0; right:0; bottom:0; z-index:2; padding:0 96px 60px;">
    <div style="font-size:var(--xxl); font-weight:800; line-height:1;">Midnight City</div>
    <div style="font-size:var(--xl); color:#dcdce4; margin-top:10px;">M83 — Hurry Up, We're Dreaming</div>
    <div style="display:flex; align-items:center; gap:24px; margin-top:34px;">
      <span style="font-size:var(--sm); color:var(--muted);">1:42</span>
      <div style="flex:1; height:10px; background:rgba(255,255,255,0.16); border-radius:999px;">
        <div style="width:42%; height:100%; background:#fff; border-radius:999px;"></div>
      </div>
      <span style="font-size:var(--sm); color:var(--muted);">4:03</span>
    </div>
    <div style="display:flex; align-items:center; gap:56px; margin-top:36px; font-size:60px;">
      <span style="opacity:0.85;">⏮</span>
      <span style="width:110px; height:110px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:50px;">⏸</span>
      <span style="opacity:0.85;">⏭</span>
      <span style="margin-left:auto; font-size:var(--md); color:var(--muted);">🔊 ▬▬▬▬▭▭</span>
    </div>
  </div>
</body></html>
